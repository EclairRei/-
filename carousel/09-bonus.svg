<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF6F0"/>
      <stop offset="100%" stop-color="#F9E7E7"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg9)"/>

  <!-- header -->
  <g transform="translate(540, 120)">
    <rect x="-140" y="-35" width="280" height="70" rx="35" fill="#D94F70"/>
    <text x="0" y="10" font-family="Noto Sans" font-weight="700" font-size="28" fill="#FFFFFF" text-anchor="middle">🎁 БОНУСЫ</text>
  </g>
  <text x="540" y="210" font-family="Noto Sans" font-weight="700" font-size="44" fill="#2B1B2E" text-anchor="middle">Трюки для продвинутых</text>

  <!-- 2x2 grid -->
  <!-- card 1 -->
  <g transform="translate(60, 280)">
    <rect x="0" y="0" width="470" height="310" rx="24" fill="#FFFFFF" stroke="#F4B8C4" stroke-width="2"/>
    <circle cx="70" cy="70" r="36" fill="#FFE4E4"/>
    <text x="70" y="82" font-family="Noto Sans" font-size="40" text-anchor="middle">⏱</text>
    <text x="130" y="80" font-family="Noto Sans" font-weight="700" font-size="26" fill="#2B1B2E">Таймер 5 минут</text>

    <text x="30" y="155" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">Не взял — передаём</text>
    <text x="30" y="185" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">следующему по очереди.</text>
    <text x="30" y="230" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">Первому прилетает:</text>
    <text x="30" y="265" font-family="Noto Sans" font-style="italic" font-size="22" fill="#D94F70">«проспал» 😏</text>
  </g>

  <!-- card 2 -->
  <g transform="translate(550, 280)">
    <rect x="0" y="0" width="470" height="310" rx="24" fill="#FFFFFF" stroke="#F4B8C4" stroke-width="2"/>
    <circle cx="70" cy="70" r="36" fill="#E8D4F5"/>
    <text x="70" y="82" font-family="Noto Sans" font-size="40" text-anchor="middle">🌙</text>
    <text x="130" y="80" font-family="Noto Sans" font-weight="700" font-size="26" fill="#2B1B2E">Рабочие часы</text>

    <text x="30" y="155" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">Колонки work_from,</text>
    <text x="30" y="185" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">work_to, таймзона.</text>
    <text x="30" y="230" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">Ночные лиды — дежурному,</text>
    <text x="30" y="260" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">остальные ждут утра</text>
  </g>

  <!-- card 3 -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="470" height="310" rx="24" fill="#FFFFFF" stroke="#F4B8C4" stroke-width="2"/>
    <circle cx="70" cy="70" r="36" fill="#E4F5E4"/>
    <text x="70" y="82" font-family="Noto Sans" font-size="40" text-anchor="middle">🔁</text>
    <text x="130" y="80" font-family="Noto Sans" font-weight="700" font-size="26" fill="#2B1B2E">Анти-дубли</text>

    <text x="30" y="155" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">Телефон уже в CRM</text>
    <text x="30" y="185" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">за последние 14 дней?</text>
    <text x="30" y="230" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">Привязываем к старой,</text>
    <text x="30" y="260" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">не плодим новые 🌸</text>
  </g>

  <!-- card 4 -->
  <g transform="translate(550, 620)">
    <rect x="0" y="0" width="470" height="310" rx="24" fill="#FFFFFF" stroke="#F4B8C4" stroke-width="2"/>
    <circle cx="70" cy="70" r="36" fill="#FFE8D4"/>
    <text x="70" y="82" font-family="Noto Sans" font-size="40" text-anchor="middle">📊</text>
    <text x="130" y="80" font-family="Noto Sans" font-weight="700" font-size="26" fill="#2B1B2E">Лог в Sheets</text>

    <text x="30" y="155" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">Параллельной веткой</text>
    <text x="30" y="185" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">пишем каждый лид.</text>
    <text x="30" y="230" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">Через неделю — сводная</text>
    <text x="30" y="260" font-family="Noto Sans" font-weight="500" font-size="22" fill="#5A3F4F">по конверсии каналов</text>
  </g>

  <!-- footer -->
  <text x="60" y="1030" font-family="Noto Sans" font-weight="500" font-size="22" fill="#7A5566">@lex_automata · #lex_cases</text>
  <text x="1020" y="1030" font-family="Noto Sans" font-weight="700" font-size="22" fill="#D94F70" text-anchor="end">9 / 10</text>
</svg>
