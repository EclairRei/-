<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF6F0"/>
      <stop offset="100%" stop-color="#F9E7E7"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg4)"/>

  <!-- step badge -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="40" fill="#D94F70"/>
    <text x="0" y="14" font-family="Noto Sans" font-weight="700" font-size="40" fill="#FFFFFF" text-anchor="middle">1</text>
  </g>
  <text x="160" y="115" font-family="Noto Sans" font-weight="700" font-size="44" fill="#2B1B2E">Приёмник + Нормализатор</text>

  <rect x="100" y="160" width="880" height="4" rx="2" fill="#D94F70"/>

  <!-- left column text -->
  <g transform="translate(100, 220)">
    <rect x="0" y="0" width="420" height="700" rx="24" fill="#FFFFFF" opacity="0.7"/>

    <text x="30" y="70" font-family="Noto Sans" font-weight="700" font-size="32" fill="#2B1B2E">🎯 Webhook</text>
    <text x="30" y="115" font-family="Noto Sans" font-weight="500" font-size="24" fill="#5A3F4F">Один URL на все три источника</text>

    <line x1="30" y1="155" x2="390" y2="155" stroke="#F4B8C4" stroke-width="2"/>

    <text x="30" y="205" font-family="Noto Sans" font-weight="500" font-size="24" fill="#2B1B2E">🌐 Сайт — форма шлёт напрямую</text>
    <text x="30" y="265" font-family="Noto Sans" font-weight="500" font-size="24" fill="#2B1B2E">🟢 Avito — через их API</text>
    <text x="30" y="325" font-family="Noto Sans" font-weight="500" font-size="24" fill="#2B1B2E">📦 WB — поллим чат раз в минуту</text>

    <line x1="30" y1="365" x2="390" y2="365" stroke="#F4B8C4" stroke-width="2"/>

    <text x="30" y="415" font-family="Noto Sans" font-weight="700" font-size="30" fill="#D94F70">🧹 Normalize</text>
    <text x="30" y="460" font-family="Noto Sans" font-weight="500" font-size="23" fill="#5A3F4F">Code-нода приводит вход</text>
    <text x="30" y="490" font-family="Noto Sans" font-weight="500" font-size="23" fill="#5A3F4F">к единой карточке лида</text>

    <!-- unified schema chip -->
    <g transform="translate(30, 540)">
      <rect x="0" y="0" width="360" height="130" rx="16" fill="#FFE4E4" stroke="#D94F70" stroke-width="2"/>
      <text x="180" y="35" font-family="Noto Sans" font-weight="700" font-size="20" fill="#D94F70" text-anchor="middle">единая модель</text>
      <text x="180" y="70" font-family="Noto Sans" font-weight="500" font-size="22" fill="#2B1B2E" text-anchor="middle">source · name · phone</text>
      <text x="180" y="100" font-family="Noto Sans" font-weight="500" font-size="22" fill="#2B1B2E" text-anchor="middle">region · product · message</text>
    </g>
  </g>

  <!-- right column icons -->
  <g transform="translate(560, 220)">
    <rect x="0" y="0" width="420" height="700" rx="24" fill="#FFFFFF" opacity="0.7"/>

    <text x="210" y="70" font-family="Noto Sans" font-weight="700" font-size="28" fill="#2B1B2E" text-anchor="middle">Источники</text>
    <line x1="30" y1="100" x2="390" y2="100" stroke="#F4B8C4" stroke-width="2"/>

    <!-- source 1 -->
    <g transform="translate(30, 140)">
      <rect x="0" y="0" width="360" height="100" rx="18" fill="#FDF0EC" stroke="#D94F70" stroke-width="2"/>
      <circle cx="55" cy="50" r="30" fill="#D94F70"/>
      <text x="55" y="62" font-family="Noto Sans" font-size="32" fill="#FFFFFF" text-anchor="middle">🌐</text>
      <text x="110" y="45" font-family="Noto Sans" font-weight="700" font-size="24" fill="#2B1B2E">Сайт</text>
      <text x="110" y="75" font-family="Noto Sans" font-weight="500" font-size="20" fill="#7A5566">Tilda · Bitrix · JS-форма</text>
    </g>

    <!-- source 2 -->
    <g transform="translate(30, 270)">
      <rect x="0" y="0" width="360" height="100" rx="18" fill="#FDF0EC" stroke="#D94F70" stroke-width="2"/>
      <circle cx="55" cy="50" r="30" fill="#7FBF4D"/>
      <text x="55" y="62" font-family="Noto Sans" font-size="32" fill="#FFFFFF" text-anchor="middle">🟢</text>
      <text x="110" y="45" font-family="Noto Sans" font-weight="700" font-size="24" fill="#2B1B2E">Avito</text>
      <text x="110" y="75" font-family="Noto Sans" font-weight="500" font-size="20" fill="#7A5566">webhooks на сообщения</text>
    </g>

    <!-- source 3 -->
    <g transform="translate(30, 400)">
      <rect x="0" y="0" width="360" height="100" rx="18" fill="#FDF0EC" stroke="#D94F70" stroke-width="2"/>
      <circle cx="55" cy="50" r="30" fill="#B8A4D4"/>
      <text x="55" y="62" font-family="Noto Sans" font-size="32" fill="#FFFFFF" text-anchor="middle">📦</text>
      <text x="110" y="45" font-family="Noto Sans" font-weight="700" font-size="24" fill="#2B1B2E">Wildberries</text>
      <text x="110" y="75" font-family="Noto Sans" font-weight="500" font-size="20" fill="#7A5566">polling чата продавца</text>
    </g>

    <!-- hint -->
    <g transform="translate(30, 540)">
      <rect x="0" y="0" width="360" height="130" rx="16" fill="#FFE4E4"/>
      <text x="30" y="40" font-family="Noto Sans" font-weight="700" font-size="22" fill="#D94F70">🌸 Правило</text>
      <text x="30" y="75" font-family="Noto Sans" font-weight="500" font-size="20" fill="#2B1B2E">Без нормализатора через</text>
      <text x="30" y="102" font-family="Noto Sans" font-weight="500" font-size="20" fill="#2B1B2E">месяц утонешь в if’ах</text>
    </g>
  </g>

  <!-- footer -->
  <text x="60" y="1030" font-family="Noto Sans" font-weight="500" font-size="22" fill="#7A5566">@lex_automata · #lex_cases</text>
  <text x="1020" y="1030" font-family="Noto Sans" font-weight="700" font-size="22" fill="#D94F70" text-anchor="end">4 / 10</text>
</svg>
