<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF6F0"/>
      <stop offset="100%" stop-color="#F9E7E7"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg6)"/>

  <!-- step badge -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="40" fill="#D94F70"/>
    <text x="0" y="14" font-family="Noto Sans" font-weight="700" font-size="40" fill="#FFFFFF" text-anchor="middle">3</text>
  </g>
  <text x="160" y="115" font-family="Noto Sans" font-weight="700" font-size="44" fill="#2B1B2E">Справочник менеджеров</text>
  <rect x="100" y="160" width="880" height="4" rx="2" fill="#D94F70"/>

  <text x="540" y="210" font-family="Noto Sans" font-weight="500" font-size="26" fill="#7A5566" text-anchor="middle">Google Sheets → Get Rows</text>

  <!-- sheet mockup -->
  <g transform="translate(60, 250)">
    <rect x="0" y="0" width="960" height="520" rx="16" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="2"/>

    <!-- header row -->
    <rect x="0" y="0" width="960" height="55" rx="16" fill="#D94F70"/>
    <rect x="0" y="40" width="960" height="15" fill="#D94F70"/>
    <text x="80" y="36" font-family="Noto Sans" font-weight="700" font-size="20" fill="#FFFFFF" text-anchor="middle">id</text>
    <text x="220" y="36" font-family="Noto Sans" font-weight="700" font-size="20" fill="#FFFFFF" text-anchor="middle">name</text>
    <text x="400" y="36" font-family="Noto Sans" font-weight="700" font-size="20" fill="#FFFFFF" text-anchor="middle">telegram_id</text>
    <text x="620" y="36" font-family="Noto Sans" font-weight="700" font-size="20" fill="#FFFFFF" text-anchor="middle">regions</text>
    <text x="890" y="36" font-family="Noto Sans" font-weight="700" font-size="20" fill="#FFFFFF" text-anchor="middle">max_active</text>

    <!-- rows -->
    <g font-family="Noto Sans" font-size="22" fill="#2B1B2E">
      <!-- row 1 -->
      <rect x="0" y="55" width="960" height="75" fill="#FDF6F0"/>
      <text x="80" y="100" text-anchor="middle">1</text>
      <text x="220" y="100" font-weight="600" text-anchor="middle">Аня</text>
      <text x="400" y="100" text-anchor="middle" font-family="monospace">123456789</text>
      <text x="620" y="100" text-anchor="middle">Москва, МО</text>
      <text x="890" y="100" text-anchor="middle">20</text>

      <!-- row 2 -->
      <rect x="0" y="130" width="960" height="75" fill="#FFFFFF"/>
      <text x="80" y="175" text-anchor="middle">2</text>
      <text x="220" y="175" font-weight="600" text-anchor="middle">Борис</text>
      <text x="400" y="175" text-anchor="middle" font-family="monospace">234567890</text>
      <text x="620" y="175" text-anchor="middle">СПб, ЛО</text>
      <text x="890" y="175" text-anchor="middle">20</text>

      <!-- row 3 -->
      <rect x="0" y="205" width="960" height="75" fill="#FDF6F0"/>
      <text x="80" y="250" text-anchor="middle">3</text>
      <text x="220" y="250" font-weight="600" text-anchor="middle">Вика</text>
      <text x="400" y="250" text-anchor="middle" font-family="monospace">345678901</text>
      <text x="620" y="250" text-anchor="middle">Новосибирск</text>
      <text x="890" y="250" text-anchor="middle">15</text>

      <!-- row 4 -->
      <rect x="0" y="280" width="960" height="75" fill="#FFFFFF"/>
      <text x="80" y="325" text-anchor="middle">4</text>
      <text x="220" y="325" font-weight="600" text-anchor="middle">Гриша</text>
      <text x="400" y="325" text-anchor="middle" font-family="monospace">456789012</text>
      <text x="620" y="325" text-anchor="middle">Другое</text>
      <text x="890" y="325" text-anchor="middle">25</text>

      <!-- row 5 -->
      <rect x="0" y="355" width="960" height="75" fill="#FDF6F0"/>
      <text x="80" y="400" text-anchor="middle">5</text>
      <text x="220" y="400" font-weight="600" text-anchor="middle">Даша</text>
      <text x="400" y="400" text-anchor="middle" font-family="monospace">567890123</text>
      <text x="620" y="400" text-anchor="middle">Москва, Другое</text>
      <text x="890" y="400" text-anchor="middle">20</text>

      <!-- row 6 (empty) -->
      <rect x="0" y="430" width="960" height="75" fill="#FFFFFF"/>
      <text x="80" y="475" text-anchor="middle" fill="#C8C8C8">+</text>
    </g>

    <!-- grid lines -->
    <g stroke="#E8E8E8" stroke-width="1">
      <line x1="140" y1="55" x2="140" y2="505"/>
      <line x1="310" y1="55" x2="310" y2="505"/>
      <line x1="510" y1="55" x2="510" y2="505"/>
      <line x1="810" y1="55" x2="810" y2="505"/>
    </g>
  </g>

  <!-- hint card -->
  <g transform="translate(60, 810)">
    <rect x="0" y="0" width="960" height="150" rx="20" fill="#FFE4E4" stroke="#D94F70" stroke-width="2"/>
    <text x="40" y="55" font-family="Noto Sans" font-weight="700" font-size="28" fill="#D94F70">🌸 Правило</text>
    <text x="40" y="100" font-family="Noto Sans" font-weight="500" font-size="26" fill="#2B1B2E">Менять логику = редактировать табличку.</text>
    <text x="40" y="135" font-family="Noto Sans" font-weight="500" font-size="26" fill="#2B1B2E">Без кода, без деплоя, без перезапуска n8n 💃</text>
  </g>

  <!-- footer -->
  <text x="60" y="1030" font-family="Noto Sans" font-weight="500" font-size="22" fill="#7A5566">@lex_automata · #lex_cases</text>
  <text x="1020" y="1030" font-family="Noto Sans" font-weight="700" font-size="22" fill="#D94F70" text-anchor="end">6 / 10</text>
</svg>
