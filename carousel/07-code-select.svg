<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9E7E7"/>
      <stop offset="100%" stop-color="#E8D4E0"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg7)"/>

  <!-- header -->
  <text x="540" y="85" font-family="Noto Sans" font-weight="700" font-size="40" fill="#2B1B2E" text-anchor="middle">Code node · Выбор менеджера</text>
  <text x="540" y="125" font-family="Noto Sans" font-weight="500" font-size="22" fill="#D94F70" text-anchor="middle">❤️ сердце воркфлоу</text>

  <!-- code window -->
  <g transform="translate(50, 155)">
    <rect x="0" y="0" width="980" height="840" rx="20" fill="#1E1E2E" stroke="#3A2E3E" stroke-width="2"/>

    <!-- traffic lights -->
    <circle cx="30" cy="30" r="10" fill="#FF5F56"/>
    <circle cx="60" cy="30" r="10" fill="#FFBD2E"/>
    <circle cx="90" cy="30" r="10" fill="#27C93F"/>
    <text x="910" y="36" font-family="Noto Sans" font-weight="500" font-size="18" fill="#B8A4D4" text-anchor="end">assign-manager.js</text>

    <g font-family="monospace,Noto Sans" font-size="22" font-weight="500">
      <!-- vars -->
      <text x="30" y="90"><tspan fill="#F38BA8">const</tspan><tspan fill="#CDD6F4"> lead </tspan><tspan fill="#F38BA8">=</tspan><tspan fill="#94E2D5"> $</tspan><tspan fill="#CDD6F4">(</tspan><tspan fill="#A6E3A1">'Normalize'</tspan><tspan fill="#CDD6F4">).item.json;</tspan></text>
      <text x="30" y="125"><tspan fill="#F38BA8">const</tspan><tspan fill="#CDD6F4"> managers </tspan><tspan fill="#F38BA8">=</tspan><tspan fill="#94E2D5"> $</tspan><tspan fill="#CDD6F4">(</tspan><tspan fill="#A6E3A1">'Get Managers'</tspan><tspan fill="#CDD6F4">).</tspan><tspan fill="#94E2D5">all</tspan><tspan fill="#CDD6F4">()</tspan></text>
      <text x="60" y="157"><tspan fill="#CDD6F4">.</tspan><tspan fill="#94E2D5">map</tspan><tspan fill="#CDD6F4">(i </tspan><tspan fill="#F38BA8">=&gt;</tspan><tspan fill="#CDD6F4"> i.json);</tspan></text>
      <text x="30" y="192"><tspan fill="#F38BA8">const</tspan><tspan fill="#CDD6F4"> loads </tspan><tspan fill="#F38BA8">=</tspan><tspan fill="#94E2D5"> $</tspan><tspan fill="#CDD6F4">(</tspan><tspan fill="#A6E3A1">'Get Active Deals'</tspan><tspan fill="#CDD6F4">).</tspan><tspan fill="#94E2D5">all</tspan><tspan fill="#CDD6F4">()</tspan></text>
      <text x="60" y="224"><tspan fill="#CDD6F4">.</tspan><tspan fill="#94E2D5">map</tspan><tspan fill="#CDD6F4">(i </tspan><tspan fill="#F38BA8">=&gt;</tspan><tspan fill="#CDD6F4"> i.json);</tspan></text>

      <!-- step 1 -->
      <text x="30" y="280"><tspan fill="#7F849C">// 1. Фильтр по региону</tspan></text>
      <text x="30" y="315"><tspan fill="#F38BA8">let</tspan><tspan fill="#CDD6F4"> list </tspan><tspan fill="#F38BA8">=</tspan><tspan fill="#CDD6F4"> managers.</tspan><tspan fill="#94E2D5">filter</tspan><tspan fill="#CDD6F4">(m </tspan><tspan fill="#F38BA8">=&gt;</tspan></text>
      <text x="60" y="347"><tspan fill="#CDD6F4">m.regions.</tspan><tspan fill="#94E2D5">split</tspan><tspan fill="#CDD6F4">(</tspan><tspan fill="#A6E3A1">','</tspan><tspan fill="#CDD6F4">).</tspan><tspan fill="#94E2D5">map</tspan><tspan fill="#CDD6F4">(s </tspan><tspan fill="#F38BA8">=&gt;</tspan><tspan fill="#CDD6F4"> s.</tspan><tspan fill="#94E2D5">trim</tspan><tspan fill="#CDD6F4">())</tspan></text>
      <text x="90" y="379"><tspan fill="#CDD6F4">.</tspan><tspan fill="#94E2D5">includes</tspan><tspan fill="#CDD6F4">(lead.region)</tspan></text>
      <text x="30" y="411"><tspan fill="#CDD6F4">);</tspan></text>

      <!-- step 2 -->
      <text x="30" y="460"><tspan fill="#7F849C">// 2. Fallback — универсалы</tspan></text>
      <text x="30" y="495"><tspan fill="#F38BA8">if</tspan><tspan fill="#CDD6F4"> (!list.length) {</tspan></text>
      <text x="60" y="527"><tspan fill="#CDD6F4">list </tspan><tspan fill="#F38BA8">=</tspan><tspan fill="#CDD6F4"> managers.</tspan><tspan fill="#94E2D5">filter</tspan><tspan fill="#CDD6F4">(m </tspan><tspan fill="#F38BA8">=&gt;</tspan></text>
      <text x="90" y="559"><tspan fill="#CDD6F4">m.regions.</tspan><tspan fill="#94E2D5">includes</tspan><tspan fill="#CDD6F4">(</tspan><tspan fill="#A6E3A1">'Другое'</tspan><tspan fill="#CDD6F4">));</tspan></text>
      <text x="30" y="591"><tspan fill="#CDD6F4">}</tspan></text>

      <!-- step 3 -->
      <text x="30" y="640"><tspan fill="#7F849C">// 3. Загрузка + отсев перегруженных</tspan></text>
      <text x="30" y="675"><tspan fill="#CDD6F4">list </tspan><tspan fill="#F38BA8">=</tspan><tspan fill="#CDD6F4"> list</tspan></text>
      <text x="60" y="707"><tspan fill="#CDD6F4">.</tspan><tspan fill="#94E2D5">map</tspan><tspan fill="#CDD6F4">(m </tspan><tspan fill="#F38BA8">=&gt;</tspan><tspan fill="#CDD6F4"> ({ ...m,</tspan></text>
      <text x="90" y="739"><tspan fill="#89DCEB">active</tspan><tspan fill="#CDD6F4">: loads.</tspan><tspan fill="#94E2D5">find</tspan><tspan fill="#CDD6F4">(l </tspan><tspan fill="#F38BA8">=&gt;</tspan><tspan fill="#CDD6F4"> l.manager_id </tspan><tspan fill="#F38BA8">===</tspan><tspan fill="#CDD6F4"> m.manager_id)?.active </tspan><tspan fill="#F38BA8">||</tspan><tspan fill="#FAB387"> 0</tspan></text>
      <text x="60" y="771"><tspan fill="#CDD6F4">}))</tspan></text>
      <text x="60" y="803"><tspan fill="#CDD6F4">.</tspan><tspan fill="#94E2D5">filter</tspan><tspan fill="#CDD6F4">(m </tspan><tspan fill="#F38BA8">=&gt;</tspan><tspan fill="#CDD6F4"> m.active </tspan><tspan fill="#F38BA8">&lt;</tspan><tspan fill="#CDD6F4"> m.max_active)</tspan></text>
    </g>
  </g>

  <!-- footer -->
  <text x="60" y="1030" font-family="Noto Sans" font-weight="500" font-size="22" fill="#7A5566">@lex_automata · #lex_cases</text>
  <text x="1020" y="1030" font-family="Noto Sans" font-weight="700" font-size="22" fill="#D94F70" text-anchor="end">7 / 10</text>
</svg>
