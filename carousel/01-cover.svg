<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF0EC"/>
      <stop offset="100%" stop-color="#F9D7D7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg1)"/>

  <!-- decorative blobs -->
  <circle cx="140" cy="180" r="180" fill="#F4B8C4" opacity="0.45" filter="url(#soft)"/>
  <circle cx="960" cy="920" r="220" fill="#D4B8E0" opacity="0.4" filter="url(#soft)"/>
  <circle cx="900" cy="160" r="90" fill="#FFD4A8" opacity="0.5" filter="url(#soft)"/>

  <!-- top badge -->
  <g transform="translate(540, 180)">
    <rect x="-130" y="-28" width="260" height="56" rx="28" fill="#D94F70"/>
    <text x="0" y="8" font-family="Noto Sans" font-weight="700" font-size="22" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">КЕЙС В ТАПОЧКАХ</text>
  </g>

  <text x="540" y="290" font-family="Noto Sans" font-weight="700" font-size="50" fill="#D94F70" text-anchor="middle">🌸</text>

  <!-- main title -->
  <text x="540" y="430" font-family="Noto Sans" font-weight="700" font-size="82" fill="#2B1B2E" text-anchor="middle">Распределение</text>
  <text x="540" y="530" font-family="Noto Sans" font-weight="700" font-size="82" fill="#2B1B2E" text-anchor="middle">лидов</text>
  <text x="540" y="620" font-family="Noto Sans" font-weight="500" font-size="56" fill="#7A5566" text-anchor="middle">по менеджерам в n8n</text>

  <!-- subtitle card -->
  <g transform="translate(540, 760)">
    <rect x="-320" y="-40" width="640" height="80" rx="40" fill="#FFFFFF" opacity="0.75"/>
    <text x="0" y="8" font-family="Noto Sans" font-weight="500" font-size="30" fill="#7A5566" text-anchor="middle">Сайт + Avito + WB → CRM → Telegram</text>
  </g>

  <!-- swipe hint -->
  <g transform="translate(540, 920)">
    <text x="0" y="0" font-family="Noto Sans" font-weight="600" font-size="32" fill="#D94F70" text-anchor="middle">свайпай ➡</text>
  </g>

  <!-- footer -->
  <text x="60" y="1030" font-family="Noto Sans" font-weight="500" font-size="22" fill="#7A5566">@lex_automata · #lex_cases</text>
  <text x="1020" y="1030" font-family="Noto Sans" font-weight="700" font-size="22" fill="#D94F70" text-anchor="end">1 / 10</text>
</svg>
